<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: linear-gradient(135deg, #0f0f0f, #1a0000);
        color: #fff;
    }

    header {
        padding: 20px;
        text-align: center;
        background: #000;
        box-shadow: 0 0 20px red;
    }

    header h1 {
        color: #ff3c00;
        text-shadow: 0 0 10px #ff3c00;
    }

    nav {
        margin-top: 10px;
    }

    nav a {
        color: #fff;
        margin: 0 15px;
        text-decoration: none;
        transition: 0.3s;
    }

    nav a:hover {
        color: #ff3c00;
        text-shadow: 0 0 5px #ff3c00;
    }

    section {
        padding: 60px 20px;
        text-align: center;
    }

    .card {
        background: #111;
        margin: 20px auto;
        padding: 20px;
        border-radius: 10px;
        width: 80%;
        box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        transition: 0.3s;
    }

    .card:hover {
        transform: scale(1.05);
        box-shadow: 0 0 25px red;
    }

    footer {
        background: #000;
        text-align: center;
        padding: 20px;
        box-shadow: 0 0 10px red;
    }
</style>
</head>
<body>

<header>
    <h1>🔥 My Portfolio</h1>
    <nav>
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section id="about">
    <h2>About Me</h2>
    <div class="card">
        <p>Hello! I'm a developer passionate about building cool websites.</p>
    </div>
</section>

<section id="projects">
    <h2>Projects</h2>
    <div class="card">
        <h3>Project 1</h3>
        <p>Describe your project here.</p>
    </div>
    <div class="card">
        <h3>Project 2</h3>
        <p>Describe your project here.</p>
    </div>
</section>

<section id="contact">
    <h2>Contact</h2>
    <div class="card">
        <p>Email: your@email.com</p>
    </div>
</section>

<footer>
    <p>© 2026 My Portfolio</p>
</footer>

</body>
</html>
